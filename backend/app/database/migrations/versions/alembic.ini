# Alembic Configuration File

# Configuración general
[alembic]
# Ruta al directorio de scripts de migración
script_location = .

# Template usado para generar nuevos archivos de migración
file_template = %%(year)d_%%(month)_02d_%%(day)_02d_%%(hour)_02d_%%(minute)_02d_%%(second)_02d_%%(slug)s

# Nombre de la tabla de versiones en la base de datos
version_table = alembic_version

# Directorio donde se almacenan las versiones
version_locations = %(here)s/versions

# Usar entorno virtual para comandos de consola
pycairo = false

# Configuración de logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# Configuración específica para Supabase/PostgreSQL
[post_write_hooks]
# Hooks que se ejecutan después de generar una migración

# Configuración de la base de datos (se sobrescribe en env.py)
[db]
# Estas variables se leen desde .env
# sqlalchemy.url = postgresql://user:pass@localhost/dbname